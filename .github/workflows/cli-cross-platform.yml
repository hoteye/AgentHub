name: CLI Cross-Platform Baseline

on:
  push:
    paths:
      - ".github/workflows/cli-cross-platform.yml"
      - ".github/workflows/release-executables.yml"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".editorconfig"
      - "requirements-dev.txt"
      - "docs/DEPENDENCY_MANAGEMENT.md"
      - "docs/TESTING_LAYOUT_RULES.md"
      - "docs/AGENTHUB_CHANGE_TEST_GATE_POLICY.md"
      - "cli/scripts/changed_files_test_gate.py"
      - "cli/scripts/provider_config_boundary_guard.py"
      - "cli/**"
      - "plugins/**"
      - "internal_policy_docs/**"
      - "shared/document_tools/**"
  pull_request:
    paths:
      - ".github/workflows/cli-cross-platform.yml"
      - ".github/workflows/release-executables.yml"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - ".editorconfig"
      - "requirements-dev.txt"
      - "docs/DEPENDENCY_MANAGEMENT.md"
      - "docs/TESTING_LAYOUT_RULES.md"
      - "docs/AGENTHUB_CHANGE_TEST_GATE_POLICY.md"
      - "cli/scripts/changed_files_test_gate.py"
      - "cli/scripts/provider_config_boundary_guard.py"
      - "cli/**"
      - "plugins/**"
      - "internal_policy_docs/**"
      - "shared/document_tools/**"
  workflow_dispatch:

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  modularity-guards:
    name: "modularity-guards | ubuntu | py3.13"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r cli/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Enforce file-size guard
        run: >
          python cli/scripts/quality_size_guard.py
          --root cli/agent_cli
          --soft 350
          --hard 500
          --baseline cli/scripts/size_guard_baseline.json

      - name: Enforce import boundaries on changed files
        run: >
          python cli/scripts/import_boundary_guard.py
          --root cli/agent_cli
          --base-ref "${{ github.base_ref }}"

      - name: Enforce provider config access boundary on changed files
        run: >
          python cli/scripts/provider_config_boundary_guard.py
          --root cli
          --base-ref "${{ github.base_ref }}"

      - name: Enforce changed-files test gate
        run: >
          python cli/scripts/changed_files_test_gate.py
          --working-dir cli
          --base-ref "${{ github.base_ref }}"

      - name: Run refill-wave focused regressions
        working-directory: cli
        run: >
          python -m pytest -q
          tests/test_workflows_summary_runtime.py
          tests/test_workflows_operator_regression.py
          tests/test_runtime_core_modules.py
          tests/test_ui_operator_status.py
          tests/test_ui_operator_surface_smoke.py
          tests/test_provider_status.py
          tests/test_turn_engine_alignment.py
          tests/test_workflows_orchestration_view.py

  fast-ui-baseline:
    name: "fast-ui | ${{ matrix.os }} | py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r cli/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run clipboard platform-selection tests
        working-directory: cli
        run: python -m pytest -q tests/test_paste_pipeline.py

      - name: Run focus and paste UI baseline
        working-directory: cli
        run: >
          python -m pytest -q -o addopts='' tests/test_app_ui_smoke.py -k
          "ctrl_v_uses_clipboard_text or
          right_click_on_composer_accepts_native_paste_event or
          right_click_copies_selected_composer_text_instead_of_pasting or
          right_click_copy_suppresses_following_native_paste_event or
          transcript_left_mouse_up_copies_selection_to_clipboard or
          prompt_composer_keeps_initial_focus or
          app_mouse_up_outside_composer_refocuses_prompt or
          app_mouse_up_on_composer_does_not_refocus_again or
          transcript_mouse_copy_keeps_focus"

  deeper-cli-baseline:
    name: "deeper-cli | ${{ matrix.os }} | py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r cli/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run headless baseline
        working-directory: cli
        run: >
          python -m pytest -q -o addopts=''
          tests/test_headless_mode.py
          tests/test_provider_status.py

  platform-tool-regressions:
    name: "platform-regressions | ${{ matrix.os }} | py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r cli/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run platform tool regressions
        working-directory: cli
        run: >
          python -m pytest -q
          tests/test_host_platform.py
          tests/test_platform_regressions.py
          tests/test_provider_status.py
          tests/test_provider_tool_specs_shared.py
          tests/test_tool_call_payloads.py
          tests/replay_integration/test_real_cases.py
          tests/replay_integration/test_live_headless_ab.py
