name: release-executables

on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"
  pull_request:
    paths:
      - ".github/workflows/release-executables.yml"
      - ".github/workflows/cli-cross-platform.yml"
      - "cli/scripts/build_release.py"
      - "cli/scripts/release_artifact_smoke.py"
      - "cli/scripts/check_release_version.py"
      - "cli/requirements-build.txt"
      - "cli/tests/test_build_release.py"
      - "cli/tests/test_release_artifact_smoke.py"
      - "cli/tests/test_release_version_check.py"
      - "scripts/ci_check.sh"
      - "scripts/release_verify.sh"
      - "scripts/release_publish.sh"
      - "docs/GUI_DESKTOP_RELEASE.md"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "requirements-dev.txt"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r cli/requirements.txt

      - name: Install build dependencies
        run: python -m pip install -r cli/requirements-build.txt

      - name: Run source CI check
        working-directory: cli
        shell: bash
        run: ../scripts/ci_check.sh

      - name: Build portable release
        run: python cli/scripts/build_release.py --clean

      - name: Smoke portable release
        run: python cli/scripts/release_artifact_smoke.py

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-archive-${{ matrix.os }}
          path: cli/artifacts/releases/*

  publish:
    if: startsWith(github.ref, 'refs/tags/cli-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-archive-*
          path: release-assets
          merge-multiple: true

      - name: Validate release tag and render release notes
        run: >
          python cli/scripts/check_release_version.py
          --ref-name "${{ github.ref_name }}"
          --release-notes-out /tmp/agenthub_cli_release_notes.md
          --print-version

      - name: Generate sha256 checksums
        run: |
          find release-assets -maxdepth 1 -type f ! -name '*.sha256' -print0 \
            | while IFS= read -r -d '' file; do
                sha256sum "$file" > "$file.sha256"
              done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/agenthub_cli_release_notes.md
          files: |
            release-assets/*
