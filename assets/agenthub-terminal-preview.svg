<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">AgentHub terminal preview</title>
  <desc id="desc">A stylized terminal preview showing AgentHub provider status and a headless workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="52%" stop-color="#10243a"/>
      <stop offset="100%" stop-color="#122f2b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="980" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="825" cy="90" r="150" fill="#34d399" opacity="0.13"/>
  <circle cx="175" cy="420" r="170" fill="#60a5fa" opacity="0.12"/>
  <rect x="70" y="64" width="840" height="392" rx="22" fill="url(#panel)" stroke="#334155" filter="url(#shadow)"/>
  <rect x="70" y="64" width="840" height="48" rx="22" fill="#0b1120"/>
  <circle cx="104" cy="88" r="7" fill="#f87171"/>
  <circle cx="128" cy="88" r="7" fill="#fbbf24"/>
  <circle cx="152" cy="88" r="7" fill="#34d399"/>
  <text x="490" y="94" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#94a3b8">AgentHub</text>
  <text x="102" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">$ python -m cli.agent_cli --headless --prompt "/provider" --json</text>
  <rect x="102" y="178" width="776" height="88" rx="14" fill="#111c2f" stroke="#263449"/>
  <text x="126" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#a7f3d0">provider</text>
  <text x="240" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#e5e7eb">openai</text>
  <text x="126" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#bfdbfe">model</text>
  <text x="240" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#e5e7eb">gpt-5.5</text>
  <text x="102" y="314" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">$ agenthub: inspect files, run commands, request approval, summarize results</text>
  <rect x="102" y="342" width="776" height="72" rx="14" fill="#0f261f" stroke="#1f4d3d"/>
  <text x="126" y="374" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#bbf7d0">✓ local-first workflow</text>
  <text x="126" y="400" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#bbf7d0">✓ explicit sandbox and approval controls</text>
</svg>
