<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="AgentHub TUI single-window workspace with on-demand right preview pane">
  <rect width="1200" height="720" fill="#10131a"/>
  <rect x="30" y="24" width="1140" height="672" rx="10" fill="#161b22" stroke="#30363d"/>

  <rect x="30" y="24" width="1140" height="42" rx="10" fill="#0d1117"/>
  <circle cx="58" cy="45" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="45" r="6" fill="#ffbd2e"/>
  <circle cx="98" cy="45" r="6" fill="#28c840"/>
  <text x="130" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">AgentHub TUI starts as one window</text>
  <text x="930" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">tmux preview opens after click</text>

  <rect x="56" y="94" width="748" height="572" rx="8" fill="#0d1117" stroke="#30363d"/>
  <rect x="56" y="94" width="748" height="28" rx="8" fill="#161b22"/>
  <text x="76" y="113" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">⍬</text>
  <text x="380" y="113" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">Project capability review</text>

  <rect x="56" y="122" width="26" height="462" fill="#11161c"/>
  <text x="64" y="178" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f0f6fc">▔🭾</text>
  <text x="66" y="202" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#f0f6fc">1▕</text>
  <text x="64" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f0f6fc">▁🭿</text>
  <text x="67" y="292" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b949e">2</text>
  <text x="67" y="362" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b949e">3</text>
  <text x="65" y="432" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#f2cc60">●</text>
  <text x="67" y="456" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b949e">4</text>

  <rect x="82" y="122" width="722" height="462" fill="#0d1117"/>
  <text x="104" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8b949e">system</text>
  <text x="170" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">Ready. Use /provider, /tools, or visible child tabs.</text>

  <text x="104" y="208" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">user</text>
  <text x="170" y="208" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e6edf3">Use visible child tabs: one reads README, one reads docs,</text>
  <text x="170" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e6edf3">then wait for all TaskRun summaries and merge findings.</text>

  <rect x="104" y="266" width="300" height="80" rx="6" fill="#0f1623" stroke="#1f6feb"/>
  <text x="124" y="294" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">visible child tab</text>
  <text x="124" y="318" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">tab 2: inspect README</text>

  <rect x="438" y="266" width="300" height="80" rx="6" fill="#0f1623" stroke="#1f6feb"/>
  <text x="458" y="294" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">visible child tab</text>
  <text x="458" y="318" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">tab 3: inspect docs</text>

  <rect x="104" y="380" width="634" height="76" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="124" y="408" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f0f6fc">wait_child_tasks(wait_for=&quot;all&quot;)</text>
  <text x="124" y="432" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">TaskRun tab 2: completed / README capabilities</text>

  <text x="104" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8b949e">assistant</text>
  <text x="190" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">Open </text>
  <text x="238" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" text-decoration="underline" fill="#a5d6ff">README.md:42</text>
  <text x="340" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9"> or </text>
  <text x="382" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" text-decoration="underline" fill="#a5d6ff">cli/docs/README.md</text>
  <text x="546" y="504" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9"> from the transcript.</text>

  <rect x="56" y="584" width="748" height="24" fill="#161b22"/>
  <text x="70" y="601" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8b949e">provider=openai | model=gpt-5.5 | tab=1 | preview=closed</text>
  <rect x="56" y="608" width="748" height="34" fill="#161b22" stroke="#30363d"/>
  <text x="72" y="630" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#c9d1d9">› ask the parent tab to summarize child TaskRun results</text>
  <rect x="56" y="642" width="748" height="24" fill="#161b22"/>
  <text x="70" y="659" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8b949e">/preview status  /preview open  /preview close  /tab_new codex</text>

  <path d="M790 504 C840 500 846 174 874 160" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="7 7"/>
  <circle cx="790" cy="504" r="5" fill="#58a6ff"/>

  <rect x="842" y="94" width="302" height="572" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="2" stroke-dasharray="8 8"/>
  <rect x="842" y="94" width="302" height="32" rx="8" fill="#0f1623"/>
  <text x="862" y="115" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e6edf3">Right preview pane</text>
  <text x="1048" y="115" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8b949e">after click</text>

  <rect x="862" y="154" width="262" height="76" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="878" y="182" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#79c0ff">Clicked target</text>
  <text x="878" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">README.md:42</text>

  <rect x="862" y="258" width="262" height="156" rx="6" fill="#0f1623" stroke="#30363d"/>
  <text x="878" y="288" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">opens with nvim/vim/less</text>
  <text x="878" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">directories use yazi/mc/ranger</text>
  <text x="878" y="344" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">URLs use w3m/lynx</text>
  <text x="878" y="384" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">exit editor: shell remains</text>

  <rect x="862" y="446" width="262" height="102" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="878" y="474" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">Startup state:</text>
  <text x="878" y="502" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#f2cc60">preview=closed</text>
  <text x="878" y="530" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">split is created lazily</text>

  <rect x="862" y="580" width="262" height="42" rx="6" fill="#0f1623" stroke="#30363d"/>
  <text x="878" y="606" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">close preview: returns to one window</text>
</svg>
