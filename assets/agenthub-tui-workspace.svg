<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="AgentHub TUI workspace with visible child tabs and split preview pane">
  <rect width="1200" height="720" fill="#10131a"/>
  <rect x="26" y="24" width="1148" height="672" rx="14" fill="#161b22" stroke="#30363d"/>

  <rect x="26" y="24" width="1148" height="44" rx="14" fill="#0d1117"/>
  <circle cx="54" cy="46" r="6" fill="#ff5f57"/>
  <circle cx="74" cy="46" r="6" fill="#ffbd2e"/>
  <circle cx="94" cy="46" r="6" fill="#28c840"/>
  <text x="128" y="51" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#e6edf3">AgentHub TUI workspace</text>

  <rect x="50" y="92" width="732" height="574" rx="8" fill="#0d1117" stroke="#30363d"/>
  <rect x="806" y="92" width="344" height="574" rx="8" fill="#0d1117" stroke="#30363d"/>

  <rect x="66" y="110" width="700" height="38" rx="6" fill="#161b22"/>
  <rect x="78" y="118" width="120" height="22" rx="4" fill="#238636"/>
  <text x="92" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#ffffff">1 Master</text>
  <rect x="206" y="118" width="126" height="22" rx="4" fill="#30363d"/>
  <text x="220" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">2 README</text>
  <rect x="340" y="118" width="116" height="22" rx="4" fill="#30363d"/>
  <text x="354" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">3 Docs</text>
  <rect x="464" y="118" width="152" height="22" rx="4" fill="#1f6feb"/>
  <text x="478" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#ffffff">4 Codex sidecar</text>
  <text x="640" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">Ctrl+T new tab</text>

  <text x="78" y="184" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#e6edf3">Master prompt</text>
  <rect x="78" y="198" width="660" height="60" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="96" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">Use visible child tabs: one reads README, one reads docs,</text>
  <text x="96" y="246" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9d1d9">then wait for all TaskRun summaries and merge findings.</text>

  <rect x="78" y="284" width="300" height="94" rx="6" fill="#0f1623" stroke="#1f6feb"/>
  <text x="94" y="310" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">spawn_child_tab</text>
  <text x="94" y="334" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">tab 2: inspect README</text>
  <text x="94" y="358" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">visible, steerable, own composer</text>

  <rect x="438" y="284" width="300" height="94" rx="6" fill="#0f1623" stroke="#1f6feb"/>
  <text x="454" y="310" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">spawn_child_tab</text>
  <text x="454" y="334" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">tab 3: inspect docs</text>
  <text x="454" y="358" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">provider can differ per tab</text>

  <rect x="78" y="410" width="660" height="122" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="96" y="436" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f0f6fc">wait_child_tasks(wait_for=&quot;all&quot;)</text>
  <text x="96" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">TaskRun tab 2: completed / claimed_done / README capabilities</text>
  <text x="96" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">TaskRun tab 3: completed / claimed_done / docs architecture</text>
  <text x="96" y="510" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">Master consumes structured TaskRun records, not hidden child state.</text>

  <rect x="78" y="564" width="660" height="54" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="96" y="598" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#c9d1d9">composer &gt; /tab_new codex    /preview toggle    /codex_threads</text>

  <rect x="824" y="110" width="308" height="38" rx="6" fill="#161b22"/>
  <text x="840" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#e6edf3">Right preview pane</text>
  <text x="1038" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">tmux</text>

  <rect x="824" y="172" width="308" height="178" rx="6" fill="#0f1623" stroke="#30363d"/>
  <text x="842" y="202" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#79c0ff">Clicked from transcript</text>
  <text x="842" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">README.md:42</text>
  <text x="842" y="254" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">docs/AGENTHUB_*.md</text>
  <text x="842" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">https://example.com</text>
  <text x="842" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">opens in nvim/vim/less/w3m/lynx</text>

  <rect x="824" y="380" width="308" height="146" rx="6" fill="#0f1623" stroke="#8957e5"/>
  <text x="842" y="410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#d2a8ff">Codex sidecar runtime</text>
  <text x="842" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">codex-app-server --listen stdio://</text>
  <text x="842" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">one process, many Codex threads</text>
  <text x="842" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">native tools, approvals, catalog</text>

  <rect x="824" y="556" width="308" height="62" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="842" y="584" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">Hover: underline clickable paths</text>
  <text x="842" y="608" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c9d1d9">Exit editor: pane returns to shell</text>
</svg>
