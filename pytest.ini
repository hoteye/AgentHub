[pytest]
addopts = -m "not live and not heavy and not policy_plugin"
testpaths = tests cli/tests
norecursedirs = .git .venv venv __pycache__ .pytest_cache .local node_modules artifacts build dist repo_ref openclaw_ref logs docs scripts gui
markers =
    live: real external provider/browser cases that require credentials or host dependencies
    browser: browser and web automation coverage for classification and targeted runs
    heavy: memory-heavy or large end-to-end suites that are excluded from default pytest runs
    policy_plugin: external policy plugin packaging/runtime coverage excluded from release-fast pytest runs
